name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permite lanzarlo manualmente desde la web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Gradle y generar wrapper
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
          unzip -q gradle.zip
          ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: StepInjector-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
