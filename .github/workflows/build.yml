name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Mostrar archivos de build
        run: |
          echo "=== build.gradle ==="
          cat build.gradle
          echo "=== settings.gradle ==="
          cat settings.gradle
          echo "=== app/build.gradle ==="
          cat app/build.gradle

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Descargar Gradle 8.4
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: Compilar APK debug
        run: ./gradle-8.4/bin/gradle :app:assembleDebug --no-daemon --no-build-cache
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: StepInjector-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
